<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আসিফ কনফেকশনারি - পূর্ণাঙ্গ বিলিং সিস্টেম</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #f4f7f6; --blue: #2980b9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--light); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-section { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-container { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); overflow: hidden; background: #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 10px; }
        #shopLogo { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .section { border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fff; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        input, select { flex: 1; min-width: 90px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        
        #reader { width: 100%; max-width: 350px; margin: 5px auto; border-radius: 10px; overflow: hidden; display: none; border: 3px solid var(--blue); }
        
        .btn { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 8px; }
        .btn-scan-main { background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-checkout { background: var(--success); color: white; font-size: 18px; }
        .btn-danger { background: var(--danger); color: white; width: auto; font-size: 12px; padding: 5px 10px; }

        /* কোয়ান্টিটি কন্ট্রোল */
        .qty-control { display: flex; align-items: center; gap: 5px; background: #f8f9fa; border-radius: 6px; padding: 2px 10px; border: 1px solid #ddd; }
        .qty-btn { width: 35px; height: 35px; border: none; background: #ddd; border-radius: 4px; cursor: pointer; font-size: 20px; font-weight: bold; }
        .qty-input { width: 50px !important; text-align: center; border: none !important; background: transparent !important; font-weight: bold; }

        .search-box-wrapper { display: flex; gap: 5px; position: relative; margin-bottom: 8px; }
        #searchList { position: absolute; width: 100%; top: 45px; background: white; border: 1px solid #ddd; z-index: 100; max-height: 250px; overflow-y: auto; border-radius: 6px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .search-item { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }

        .cart-section { background: #fffdf2; border: 2px solid var(--warning); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .total-row { font-size: 22px; font-weight: bold; text-align: right; color: var(--primary); padding: 10px 0; border-top: 2px dashed #ccc; }

        /* রিপোর্ট টেবিল স্টাইল */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .report-table th, .report-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .report-table th { background: #f8f9fa; }
        .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { padding: 15px; border-radius: 8px; color: white; text-align: center; }

        #editModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.5); z-index: 1000; width: 85%; max-width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <label for="logoInput"><div class="logo-container"><img id="shopLogo"><div id="placeholderText">লোগো</div></div></label>
        <input type="file" id="logoInput" accept="image/*" onchange="uploadLogo(event)" style="display:none">
        <h2 style="margin:0; color:var(--primary)">আসিফ কনফেকশনারি</h2>
    </div>

    <div id="reader"></div>
    <button id="stopBtn" class="btn" style="display:none; background:var(--danger); color:white;" onclick="stopScanner()">ক্যামেরা বন্ধ করুন</button>

    <div class="cart-section">
        <h3 style="margin:0 0 10px; color:#d35400;">🛒 কাস্টমার লিস্ট (কার্ট)</h3>
        <table style="width:100%; border-collapse: collapse;">
            <tbody id="cartBody"></tbody>
        </table>
        <div class="total-row">মোট বিল: <span id="cartTotal">০</span> ৳</div>
        <button class="btn btn-checkout" onclick="checkout()">বিক্রি সম্পন্ন করুন</button>
    </div>

    <div class="section">
        <button class="btn btn-scan-main" onclick="startScanner('sale')">📷 স্ক্যান করে পণ্য খুঁজুন</button>
        <div class="search-box-wrapper">
            <input type="text" id="productSearch" placeholder="নাম বা কোড লিখে খুঁজুন..." oninput="searchProduct()">
            <select id="catFilter" style="max-width: 80px;" onchange="searchProduct()"><option value="">সব</option></select>
            <div id="searchList"></div>
        </div>
        <div id="selectedInfo" style="display:none; padding:12px; background:#e1f5fe; border-radius:6px; margin-bottom:10px; border-left:5px solid var(--blue);"></div>
        
        <div class="input-group" style="align-items: center;">
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <input type="number" id="saleQty" class="qty-input" value="1" min="1">
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn" style="flex:2; margin-bottom:0; background:var(--primary); color:white;" onclick="addToCart()">কার্টে যোগ করুন</button>
        </div>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>📊 আজকের রিপোর্ট</h3>
            <button class="btn-danger" onclick="clearSalesHistory()">সব রিপোর্ট মুছুন</button>
        </div>
        <div class="summary-cards">
            <div class="card" style="background: var(--blue);">মোট বিক্রি: <br><b id="totalSell">০</b> ৳</div>
            <div class="card" style="background: var(--success);">মোট লাভ: <br><b id="totalProfit">০</b> ৳</div>
        </div>
        <div style="overflow-x:auto;">
            <table class="report-table">
                <thead><tr><th>পণ্য</th><th>পরিমাণ</th><th>বিক্রি</th><th>লাভ</th><th>মুছুন</th></tr></thead>
                <tbody id="saleLog"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h4>📦 নতুন পণ্য ইনভেন্টরি সেভ</h4>
        <div class="input-group">
            <input type="text" id="setupBarcode" placeholder="বারকোড নম্বর">
            <button onclick="startScanner('setup')" style="padding:10px; border-radius:6px; border:1px solid #ccc; cursor:pointer;">📷</button>
        </div>
        <div class="input-group">
            <input type="text" id="setupCat" placeholder="ক্যাটাগরি">
            <input type="text" id="setupName" placeholder="পণ্যের নাম">
        </div>
        <div class="input-group">
            <input type="number" id="setupBuyPrice" placeholder="কেনা দাম">
            <input type="number" id="setupSalePrice" placeholder="বেচা দাম">
        </div>
        <button class="btn" style="background:var(--primary); color:white;" onclick="saveProduct()">ইনভেন্টরিতে সেভ</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeEdit()"></div>
<div id="editModal">
    <h3>পণ্য সংশোধন</h3>
    <input type="text" id="editBarcode" placeholder="বারকোড" style="width:100%; margin-bottom:10px; padding:10px; border-radius:6px; border:1px solid #ddd;">
    <input type="text" id="editCat" placeholder="ক্যাটাগরি" style="width:100%; margin-bottom:10px; padding:10px; border-radius:6px; border:1px solid #ddd;">
    <input type="text" id="editName" placeholder="নাম" style="width:100%; margin-bottom:10px; padding:10px; border-radius:6px; border:1px solid #ddd;">
    <input type="number" id="editBuy" placeholder="কেনা দাম" style="width:100%; margin-bottom:10px; padding:10px; border-radius:6px; border:1px solid #ddd;">
    <input type="number" id="editSale" placeholder="বেচা দাম" style="width:100%; margin-bottom:10px; padding:10px; border-radius:6px; border:1px solid #ddd;">
    <div style="display:flex; gap:10px;">
        <button class="btn" style="background:#ccc;" onclick="closeEdit()">বাতিল</button>
        <button class="btn" style="background:var(--success); color:white;" onclick="updateProduct()">আপডেট</button>
    </div>
</div>

<script>
    // পুরাতন ডাটা কী (Keys) মাইগ্রেশন লজিক
    const KEYS = ["asif_inv_v7", "asif_inv_v6", "asif_inv_v5"];
    const SALE_KEY = "asif_sales_v7";
    const LOGO_KEY = "asif_shop_logo";

    function getInitialInv() {
        for(let k of KEYS) {
            let d = localStorage.getItem(k);
            if(d) return JSON.parse(d);
        }
        return [];
    }

    let inventory = getInitialInv();
    let sales = JSON.parse(localStorage.getItem(SALE_KEY)) || [];
    let cart = [], selectedIdx = -1, editingIdx = -1, html5QrCode;

    function startScanner(target) {
        const reader = document.getElementById("reader");
        reader.style.display = "block";
        document.getElementById("stopBtn").style.display = "block";
        if(html5QrCode) html5QrCode.clear();
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 280, height: 160 } }, (decodedText) => {
            beep(); stopScanner();
            if (target === 'setup') document.getElementById("setupBarcode").value = decodedText;
            else if (target === 'sale') {
                let idx = inventory.findIndex(p => p.barcode === decodedText);
                if (idx !== -1) selectProduct(idx); else alert("পণ্যটি ইনভেন্টরিতে নেই!");
            }
        }).catch(err => console.log(err));
    }

    function stopScanner() { if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById("reader").style.display = "none"; document.getElementById("stopBtn").style.display = "none"; }); }
    function beep() { try { new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play(); } catch(e){} }
    function changeQty(val) { let el = document.getElementById("saleQty"); let current = parseInt(el.value); if(current + val >= 1) el.value = current + val; }

    function saveProduct() {
        let b = document.getElementById("setupBarcode").value, c = document.getElementById("setupCat").value,
            n = document.getElementById("setupName").value, bp = parseFloat(document.getElementById("setupBuyPrice").value),
            sp = parseFloat(document.getElementById("setupSalePrice").value);
        inventory.push({ barcode: b, cat: c, name: n, buyPrice: bp, salePrice: sp });
        localStorage.setItem("asif_inv_v7", JSON.stringify(inventory));
        location.reload();
    }

    function searchProduct() {
        let q = document.getElementById("productSearch").value.toLowerCase(), cat = document.getElementById("catFilter").value, list = document.getElementById("searchList");
        list.innerHTML = ""; if(!q && !cat) { list.style.display = "none"; return; }
        let filtered = inventory.filter((p, i) => { p.tIdx = i; return (p.name.toLowerCase().includes(q) || (p.barcode && p.barcode.includes(q))) && (!cat || p.cat === cat); });
        if(filtered.length > 0) {
            list.style.display = "block";
            filtered.forEach(p => {
                list.innerHTML += `<div class="search-item">
                    <div onclick="selectProduct(${p.tIdx})" style="flex:1; cursor:pointer;"><b>${p.name}</b><br><small>${p.barcode || 'কোড নাই'}</small></div>
                    <button onclick="openEdit(${p.tIdx})" style="background:var(--warning); border:none; color:white; padding:5px; border-radius:4px; font-size:11px;">এডিট</button>
                </div>`;
            });
        } else list.style.display = "none";
    }

    function selectProduct(idx) {
        selectedIdx = idx; let p = inventory[idx];
        document.getElementById("productSearch").value = p.name;
        document.getElementById("selectedInfo").style.display = "block";
        document.getElementById("selectedInfo").innerHTML = `পণ্য: <b>${p.name}</b> | দাম: ${p.salePrice}৳`;
        document.getElementById("searchList").style.display = "none";
    }

    function addToCart() {
        if(selectedIdx === -1) return alert("পণ্য সিলেক্ট করুন!");
        let q = parseInt(document.getElementById("saleQty").value), p = inventory[selectedIdx];
        cart.push({ name: p.name, qty: q, buy: p.buyPrice, sale: p.salePrice, total: p.salePrice * q });
        renderCart();
        selectedIdx = -1; document.getElementById("productSearch").value = ""; 
        document.getElementById("selectedInfo").style.display = "none"; document.getElementById("saleQty").value = "1";
    }

    function renderCart() {
        let body = document.getElementById("cartBody"), total = 0; body.innerHTML = "";
        cart.forEach((item, i) => { 
            total += item.total; 
            body.innerHTML += `<tr style="border-bottom:1px solid #eee"><td>${item.name} x ${item.qty}</td><td style="text-align:right">${item.total}৳</td><td onclick="cart.splice(${i},1);renderCart()" style="color:red; cursor:pointer; text-align:right; font-weight:bold; padding-left:10px;">&times;</td></tr>`; 
        });
        document.getElementById("cartTotal").innerText = total;
    }

    function checkout() {
        if(cart.length === 0) return alert("কার্ট খালি!");
        cart.forEach(item => { sales.push({ name: item.name, qty: item.qty, sell: item.total, profit: (item.sale - item.buy) * item.qty }); });
        localStorage.setItem(SALE_KEY, JSON.stringify(sales));
        cart = []; renderCart(); displaySales(); alert("বিক্রি সফল!");
    }

    function displaySales() {
        let log = document.getElementById("saleLog"), ts = 0, tp = 0; log.innerHTML = "";
        sales.forEach((s, i) => {
            ts += s.sell; tp += s.profit;
            log.innerHTML += `<tr><td>${s.name}</td><td>${s.qty}</td><td>${s.sell}</td><td style="color:green">${s.profit.toFixed(2)}</td><td><button onclick="removeSale(${i})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">&times;</button></td></tr>`;
        });
        document.getElementById("totalSell").innerText = ts;
        document.getElementById("totalProfit").innerText = tp.toFixed(2);
    }

    function removeSale(i) { if(confirm("এই আইটেমটি মুছবেন?")) { sales.splice(i, 1); localStorage.setItem(SALE_KEY, JSON.stringify(sales)); displaySales(); } }
    function clearSalesHistory() { if(confirm("আপনি কি আজকের সব রিপোর্ট মুছে ফেলতে চান?")) { sales = []; localStorage.setItem(SALE_KEY, JSON.stringify(sales)); displaySales(); } }

    function openEdit(idx) {
        editingIdx = idx; let p = inventory[idx];
        document.getElementById("editBarcode").value = p.barcode || "";
        document.getElementById("editCat").value = p.cat;
        document.getElementById("editName").value = p.name;
        document.getElementById("editBuy").value = p.buyPrice;
        document.getElementById("editSale").value = p.salePrice;
        document.getElementById("editModal").style.display = "block";
        document.getElementById("overlay").style.display = "block";
    }
    function closeEdit() { document.getElementById("editModal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }
    function updateProduct() {
        let p = inventory[editingIdx];
        p.barcode = document.getElementById("editBarcode").value; p.cat = document.getElementById("editCat").value;
        p.name = document.getElementById("editName").value; p.buyPrice = parseFloat(document.getElementById("editBuy").value);
        p.salePrice = parseFloat(document.getElementById("editSale").value);
        localStorage.setItem("asif_inv_v7", JSON.stringify(inventory));
        location.reload();
    }

    function uploadLogo(e) { let r = new FileReader(); r.onload = (ev) => localStorage.setItem(LOGO_KEY, ev.target.result); r.readAsDataURL(e.target.files[0]); setTimeout(()=>location.reload(), 500); }
    function loadLogo() { let s = localStorage.getItem(LOGO_KEY); if(s) { document.getElementById("shopLogo").src = s; document.getElementById("shopLogo").style.display = "block"; document.getElementById("placeholderText").style.display = "none"; } }

    window.onload = () => {
        loadLogo(); displaySales();
        let cats = [...new Set(inventory.map(p => p.cat))];
        cats.forEach(c => { if(c) document.getElementById("catFilter").innerHTML += `<option value="${c}">${c}</option>`; });
    };
</script>
</body>
</html>
