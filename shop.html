<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্থায়ী দোকানের হিসাব তালিকা</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        input { width: 95%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-add { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background-color: #218838; }
        .btn-clear { width: 100%; padding: 10px; margin-top: 15px; background-color: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
        .total-section { margin-top: 20px; font-weight: bold; font-size: 20px; text-align: right; border-top: 2px solid #1a73e8; padding-top: 10px; color: #333; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>দোকানের ডেইলি হিসাব</h2>
    
    <input type="text" id="itemName" placeholder="পণ্যের নাম (যেমন: ডাল)">
    <input type="number" id="itemPrice" placeholder="টাকার পরিমাণ (যেমন: ১০০)">
    <button class="btn-add" onclick="addItem()">লিস্টে যোগ করুন</button>

    <table id="itemTable">
        <thead>
            <tr>
                <th>নাম</th>
                <th>দাম (টাকা)</th>
                <th>অ্যাকশন</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="total-section">
        মোট: <span id="totalAmount">০</span> টাকা
    </div>

    <button class="btn-clear" onclick="clearAll()">সব ডিলিট করুন</button>
</div>

<script>
    // পেজ লোড হওয়ার সময় আগের সেভ করা ডাটা নিয়ে আসা
    document.addEventListener("DOMContentLoaded", displayItems);

    function addItem() {
        let name = document.getElementById("itemName").value;
        let price = document.getElementById("itemPrice").value;

        if (name === "" || price === "") {
            alert("দয়া করে নাম ও দাম সঠিকভাবে দিন।");
            return;
        }

        let item = { name: name, price: parseFloat(price) };

        // LocalStorage থেকে আগের লিস্ট আনা
        let items = JSON.parse(localStorage.getItem("shopItems")) || [];
        items.push(item);

        // নতুন লিস্ট সেভ করা
        localStorage.setItem("shopItems", JSON.stringify(items));

        // ইনপুট খালি করা এবং টেবিল আপডেট
        document.getElementById("itemName").value = "";
        document.getElementById("itemPrice").value = "";
        displayItems();
    }

    function displayItems() {
        let items = JSON.parse(localStorage.getItem("shopItems")) || [];
        let tableBody = document.querySelector("#itemTable tbody");
        tableBody.innerHTML = "";
        let total = 0;

        items.forEach((item, index) => {
            let row = `<tr>
                <td>${item.name}</td>
                <td>${item.price.toFixed(2)}</td>
                <td><button class="delete-btn" onclick="removeItem(${index})">X</button></td>
            </tr>`;
            tableBody.innerHTML += row;
            total += item.price;
        });

        document.getElementById("totalAmount").innerText = total.toFixed(2);
    }

    function removeItem(index) {
        let items = JSON.parse(localStorage.getItem("shopItems"));
        items.splice(index, 1);
        localStorage.setItem("shopItems", JSON.stringify(items));
        displayItems();
    }

    function clearAll() {
        if (confirm("আপনি কি সব তথ্য মুছে ফেলতে চান?")) {
            localStorage.removeItem("shopItems");
            displayItems();
        }
    }
</script>

</body>
</html>
